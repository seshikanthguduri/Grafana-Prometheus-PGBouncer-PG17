[databases]
; Route to Primary for write operations
my_app_db_write = host=postgres_primary port=5432 dbname=my_app_db

; Route to Standby for read-heavy operations
my_app_db_read  = host=postgres_standby port=5432 dbname=my_app_db

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Use SCRAM authentication
auth_type = scram-sha-256
; Standard fallback template required by the engine
auth_file = /etc/pgbouncer/userlist.txt

; CRITICAL: Look up users directly from the database instead of a static file
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20
admin_users = db_user

